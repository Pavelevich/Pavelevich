<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220">
<defs>
<style type="text/css"><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&amp;display=swap');
.wm{font-family:'Fira Code',monospace;font-weight:700;}
.sub{font-family:'Fira Code',monospace;font-weight:500;}
.rain{font-family:'Fira Code',monospace;font-weight:500;}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.cursor{animation:blink 1.06s step-end infinite;}
@keyframes draw{from{stroke-dashoffset:520}to{stroke-dashoffset:0}}
.underline{stroke-dasharray:520;stroke-dashoffset:520;animation:draw 2.6s cubic-bezier(.22,1,.36,1) .4s forwards;}
@keyframes glowpulse{0%,100%{opacity:.92}50%{opacity:1}}
.glow{animation:glowpulse 4.5s ease-in-out infinite;}
]]></style>

<radialGradient id="vignette" cx="50%" cy="50%" r="75%">
<stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
<stop offset="70%" stop-color="#0D1117" stop-opacity="0"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
</radialGradient>

<linearGradient id="centerCalm" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
<stop offset="28%" stop-color="#0D1117" stop-opacity="0.92"/>
<stop offset="50%" stop-color="#0D1117" stop-opacity="0.97"/>
<stop offset="72%" stop-color="#0D1117" stop-opacity="0.92"/>
<stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
</linearGradient>

<linearGradient id="tailFade" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
<stop offset="55%" stop-color="#ffffff" stop-opacity="0.55"/>
<stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
</linearGradient>
<mask id="colMask"><rect x="0" y="0" width="60" height="260" fill="url(#tailFade)"/></mask>

<filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
<feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b2"/>
<feMerge>
<feMergeNode in="b2"/>
<feMergeNode in="b1"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
<feGaussianBlur in="SourceGraphic" stdDeviation="1.6"/>
</filter>

<linearGradient id="wmGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#9dffb0"/>
<stop offset="45%" stop-color="#00FF00"/>
<stop offset="100%" stop-color="#00AA00"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="1200" height="220" fill="#0D1117"/>

<!-- ===== Matrix rain: left third + right third only ===== -->
<g class="rain" font-size="17" mask="url(#colMask)" opacity="0.85">

<!-- LEFT THIRD -->
<g transform="translate(40,-260)">
<g opacity="0.55">
<text x="0" y="0" fill="#008F11">0<tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">ﾊ</tspan></text>
<text x="0" y="0" dy="-6" fill="#bfffbf">ｳ</text>
<animateTransform attributeName="transform" type="translate" from="40 -260" to="40 220" dur="11s" repeatCount="indefinite"/>
</g>
</g>

<g transform="translate(96,-260)">
<g opacity="0.4">
<text x="0" y="0" fill="#00AA00">1<tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ﾊ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">0</tspan></text>
<text x="0" y="0" dy="-6" fill="#bfffbf">ﾐ</text>
<animateTransform attributeName="transform" type="translate" from="96 -300" to="96 220" dur="15s" begin="-4s" repeatCount="indefinite"/>
</g>
</g>

<g transform="translate(152,-260)">
<g opacity="0.6">
<text x="0" y="0" fill="#008F11">ﾋ<tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ｳ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ﾊ</tspan></text>
<text x="0" y="0" dy="-6" fill="#d6ffd6">1</text>
<animateTransform attributeName="transform" type="translate" from="152 -280" to="152 220" dur="9.5s" begin="-2s" repeatCount="indefinite"/>
</g>
</g>

<g transform="translate(214,-260)">
<g opacity="0.32">
<text x="0" y="0" fill="#00AA00">0<tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">0</tspan></text>
<text x="0" y="0" dy="-6" fill="#bfffbf">ｳ</text>
<animateTransform attributeName="transform" type="translate" from="214 -320" to="214 220" dur="17s" begin="-9s" repeatCount="indefinite"/>
</g>
</g>

<!-- left: cyan accent + seeded mid-canvas -->
<g transform="translate(68,-260)">
<g opacity="0.3">
<text x="0" y="0" fill="#0AA3B8">1<tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ｼ</tspan></text>
<text x="0" y="0" dy="-6" fill="#8ff6ff">0</text>
<animateTransform attributeName="transform" type="translate" from="68 -260" to="68 220" dur="13s" begin="-8s" repeatCount="indefinite"/>
</g>
</g>

<g transform="translate(180,-260)">
<g opacity="0.42">
<text x="0" y="0" fill="#00AA00">ﾊ<tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ｼ</tspan></text>
<text x="0" y="0" dy="-6" fill="#d6ffd6">1</text>
<animateTransform attributeName="transform" type="translate" from="180 -260" to="180 220" dur="12s" begin="-9s" repeatCount="indefinite"/>
</g>
</g>

<!-- RIGHT THIRD -->
<g transform="translate(980,-260)">
<g opacity="0.6">
<text x="0" y="0" fill="#008F11">ﾊ<tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾋ</tspan></text>
<text x="0" y="0" dy="-6" fill="#d6ffd6">0</text>
<animateTransform attributeName="transform" type="translate" from="980 -290" to="980 220" dur="10.5s" begin="-3s" repeatCount="indefinite"/>
</g>
</g>

<g transform="translate(1042,-260)">
<g opacity="0.38">
<text x="0" y="0" fill="#00AA00">1<tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ｳ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">0</tspan></text>
<text x="0" y="0" dy="-6" fill="#bfffbf">ﾐ</text>
<animateTransform attributeName="transform" type="translate" from="1042 -310" to="1042 220" dur="15.5s" begin="-6s" repeatCount="indefinite"/>
</g>
</g>

<g transform="translate(1098,-260)">
<g opacity="0.55">
<text x="0" y="0" fill="#008F11">0<tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾊ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">1</tspan></text>
<text x="0" y="0" dy="-6" fill="#d6ffd6">ｳ</text>
<animateTransform attributeName="transform" type="translate" from="1098 -270" to="1098 220" dur="9s" begin="-1s" repeatCount="indefinite"/>
</g>
</g>

<g transform="translate(1154,-260)">
<g opacity="0.3">
<text x="0" y="0" fill="#00AA00">ｼ<tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">0</tspan></text>
<text x="0" y="0" dy="-6" fill="#bfffbf">1</text>
<animateTransform attributeName="transform" type="translate" from="1154 -330" to="1154 220" dur="18s" begin="-7s" repeatCount="indefinite"/>
</g>
</g>

<!-- right: extra + cyan accent, seeded mid-canvas -->
<g transform="translate(1016,-260)">
<g opacity="0.4">
<text x="0" y="0" fill="#008F11">0<tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ｳ</tspan><tspan x="0" dy="22">0</tspan></text>
<text x="0" y="0" dy="-6" fill="#d6ffd6">ﾊ</text>
<animateTransform attributeName="transform" type="translate" from="1016 -260" to="1016 220" dur="12.5s" begin="-8s" repeatCount="indefinite"/>
</g>
</g>

<g transform="translate(1126,-260)">
<g opacity="0.28">
<text x="0" y="0" fill="#0AA3B8">1<tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾐ</tspan></text>
<text x="0" y="0" dy="-6" fill="#8ff6ff">0</text>
<animateTransform attributeName="transform" type="translate" from="1126 -260" to="1126 220" dur="14s" begin="-7s" repeatCount="indefinite"/>
</g>
</g>
</g>

<!-- calm center band so wordmark stays legible -->
<rect x="0" y="0" width="1200" height="220" fill="url(#centerCalm)"/>

<!-- vignette -->
<rect x="0" y="0" width="1200" height="220" fill="url(#vignette)"/>

<!-- ===== Wordmark ===== -->
<g class="glow">
<text x="600" y="108" text-anchor="middle" class="wm" font-size="84" letter-spacing="14"
fill="#00FF00" filter="url(#neon)">TETSUO</text>
<text x="600" y="108" text-anchor="middle" class="wm" font-size="84" letter-spacing="14"
fill="url(#wmGrad)">TETSUO</text>
</g>

<!-- thin animated underline that draws in -->
<line class="underline" x1="412" y1="132" x2="788" y2="132"
stroke="#00FF00" stroke-width="2" stroke-linecap="round" filter="url(#softglow)"/>

<!-- ===== Subtitle + cursor ===== -->
<g class="sub" font-size="19" letter-spacing="2">
<text x="600" y="170" text-anchor="middle" fill="#00AA00" filter="url(#softglow)">&gt; systems · agents · blockchain · privacy<tspan dx="8" class="cursor" fill="#00FF00">▋</tspan></text>
</g>

</svg>