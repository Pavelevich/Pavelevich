<!-- calm center band so wordmark stays legible -->
<rect x="0" y="0" width="1200" height="220" fill="url(#centerCalm)"/>

<!-- vignette -->
<rect x="0" y="0" width="1200" height="220" fill="url(#vignette)"/>

<!-- ===== AGENC logo lockup: icon + lettering, white with purple brand glow ===== -->
<g class="glow">
<g filter="url(#pglow)" fill="#BA63EF">
<use xlink:href="#agIcon" transform="translate(398,48) scale(0.18)"/>
<use xlink:href="#agWord" transform="translate(500,57) scale(0.42)"/>
</g>
<g fill="#ffffff">
<use xlink:href="#agIcon" transform="translate(398,48) scale(0.18)"/>
<use xlink:href="#agWord" transform="translate(500,57) scale(0.42)"/>
</g>
</g>

<!-- ===== Subtitle + cursor ===== -->
<g class="sub" font-size="19" letter-spacing="2">
<text x="600" y="170" text-anchor="middle" fill="#00AA00" filter="url(#softglow)">&gt; systems · agents · blockchain · privacy<tspan dx="8" class="cursor" fill="#00FF00">▋</tspan></text>
</g>

</svg>