<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="220" viewBox="0 0 1200 220">
<defs>
<style type="text/css"><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&amp;display=swap');
.wm{font-family:'Fira Code',monospace;font-weight:700;}
.sub{font-family:'Fira Code',monospace;font-weight:500;}
.rain{font-family:'Fira Code',monospace;font-weight:500;}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.cursor{animation:blink 1.06s step-end infinite;}
@keyframes draw{from{stroke-dashoffset:520}to{stroke-dashoffset:0}}
.underline{stroke-dasharray:520;stroke-dashoffset:520;animation:draw 2.6s cubic-bezier(.22,1,.36,1) .4s forwards;}
@keyframes glowpulse{0%,100%{opacity:.92}50%{opacity:1}}
.glow{animation:glowpulse 4.5s ease-in-out infinite;}
]]></style>

<radialGradient id="vignette" cx="50%" cy="50%" r="75%">
<stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
<stop offset="70%" stop-color="#0D1117" stop-opacity="0"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
</radialGradient>

<linearGradient id="centerCalm" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
<stop offset="28%" stop-color="#0D1117" stop-opacity="0.92"/>
<stop offset="50%" stop-color="#0D1117" stop-opacity="0.97"/>
<stop offset="72%" stop-color="#0D1117" stop-opacity="0.92"/>
<stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
</linearGradient>

<linearGradient id="tailFade" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
<stop offset="55%" stop-color="#ffffff" stop-opacity="0.55"/>
<stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
</linearGradient>
<mask id="colMask"><rect x="0" y="0" width="60" height="260" fill="url(#tailFade)"/></mask>

<filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
<feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b2"/>
<feMerge>
<feMergeNode in="b2"/>
<feMergeNode in="b1"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
<feGaussianBlur in="SourceGraphic" stdDeviation="1.6"/>
</filter>

<linearGradient id="wmGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#9dffb0"/>
<stop offset="45%" stop-color="#00FF00"/>
<stop offset="100%" stop-color="#00AA00"/>
</linearGradient>

<!-- AGENC brand purple glow -->
<filter id="pglow" x="-35%" y="-35%" width="170%" height="170%">
<feGaussianBlur in="SourceGraphic" stdDeviation="5" result="pb1"/>
<feGaussianBlur in="SourceGraphic" stdDeviation="10" result="pb2"/>
<feMerge>
<feMergeNode in="pb2"/>
<feMergeNode in="pb1"/>
</feMerge>
</filter>

<!-- AGENC geometric mark (fill inherited from <use>) -->
