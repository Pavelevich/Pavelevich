<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="480" height="480" viewBox="0 0 480 480">
<defs>
<!-- soft dark disc so the white mark stays visible on any theme -->
<radialGradient id="bg" cx="50%" cy="50%" r="60%">
<stop offset="0%" stop-color="#0D1117" stop-opacity="0.95"/>
<stop offset="55%" stop-color="#0D1117" stop-opacity="0.7"/>
<stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
</radialGradient>
<!-- purple brand halo -->
<radialGradient id="halo" cx="50%" cy="50%" r="46%">
<stop offset="0%" stop-color="#BA63EF" stop-opacity="0.38"/>
<stop offset="65%" stop-color="#BA63EF" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#BA63EF" stop-opacity="0"/>
</radialGradient>
<filter id="pglow" x="-45%" y="-45%" width="190%" height="190%">
<feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b1"/>
<feGaussianBlur in="SourceGraphic" stdDeviation="13" result="b2"/>
<feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/></feMerge>
</filter>

<!-- AGENC geometric mark (fill inherited from <use>) -->
<g id="agIcon">
<polygon points="451.82 350.07 426.33 375.49 400.9 350.07 426.33 324.58 451.82 350.07"/>
<polygon points="451.82 400.98 400.9 451.84 375.41 426.41 426.33 375.49 451.82 400.98"/>
<rect x="332.01" y="408.43" width="35.96" height="35.96" transform="translate(-199.01 372.39) rotate(-45)"/>
<path d="M25.43,76.42L0,101.85l25.43,25.49,25.49-25.49-25.49-25.43ZM50.91.02L0,50.93l25.43,25.49,50.92-50.92L50.91.02ZM101.77.02l-25.43,25.49,25.43,25.43,25.49-25.43L101.77.02Z"/>
<path d="M133.6,165.48l.08.04,31.76-31.85-31.85,31.8ZM349.99,0l-25.43,25.51,25.43,25.43,25.43-25.43L349.99,0ZM400.88,0l-25.47,25.51,50.9,50.9,25.51-25.47L400.88,0ZM426.31,76.41l-25.43,25.43,25.43,25.51,25.51-25.51-25.51-25.43Z"/>
<polygon points="50.91 350.07 25.43 375.49 0 350.07 25.43 324.58 50.91 350.07"/>
<polygon points="76.34 426.41 50.91 451.84 0 400.98 25.43 375.49 76.34 426.41"/>
<polygon points="127.26 426.41 101.83 451.84 76.34 426.41 101.77 400.98 127.26 426.41"/>
<path d="M451.82,152.77l-25.51-25.43-73.15,73.16-101.83-101.83,73.24-73.16L299.09,0l-73.2,73.24L152.7,0l-25.43,25.51,73.16,73.16-34.97,35.01-31.76,31.85-35.06,35.01L25.43,127.34,0,152.77l73.2,73.2L0,299.16l25.43,25.43,73.2-73.2,66.82,66.82,34.97,35.01-73.16,73.2,25.43,25.43,73.2-73.2,73.2,73.2,25.47-25.43-73.24-73.2,66.82-66.78,35.02-35.06,73.15,73.2,25.51-25.43-73.15-73.2,73.15-73.2ZM225.89,321.38l-95.46-95.46,95.46-95.41,95.5,95.41-95.5,95.46Z"/>
</g>
</defs>

<!-- background halo -->
<rect width="480" height="480" fill="url(#bg)"/>
<rect width="480" height="480" fill="url(#halo)"/>

<!-- ===== AGENC mark spinning in 3D around its central vertical axis ===== -->
<!-- origin moved to canvas center; inner scaleX flip (+1 -> 0 -> -1 -> 0 -> +1) = Y-axis rotation -->
<g transform="translate(240,240)">
<g>
<animateTransform attributeName="transform" type="scale"
values="1 1;0.05 1;-1 1;0.05 1;1 1" keyTimes="0;0.25;0.5;0.75;1"
calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
dur="5.5s" repeatCount="indefinite"/>
<!-- center the mark on the origin, then scale to display size -->
<g transform="scale(0.62) translate(-225.91,-225.93)">
<animate attributeName="opacity" values="1;0.55;1;0.55;1" keyTimes="0;0.25;0.5;0.75;1"
calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
dur="5.5s" repeatCount="indefinite"/>
<g filter="url(#pglow)" fill="#BA63EF"><use xlink:href="#agIcon"/></g>
<g fill="#ffffff"><use xlink:href="#agIcon"/></g>
</g>
</g>
</g>
</svg>
